<section id="products" class="section section-dark">
  <div class="container">
    <div class="section-header text-center">
      <span class="badge badge-wood">{{ t().products.badge }}</span>
      <h2 class="section-title">{{ t().products.title }}</h2>
      <p class="section-intro">{{ t().products.intro }}</p>
    </div>
    
    <div class="grid-three">
      <!-- Collection 1: AeroShield -->
      <div class="product-card">
        <div class="card-visual">
          <img 
            src="/assets/pannelli-wpc-rivestimenti-esterni.jpeg" 
            onerror="this.src='https://images.unsplash.com/photo-1513694203232-719a280e022f?auto=format&fit=crop&w=600&q=80'" 
            alt="AeroShield" 
            class="product-img" 
          />
          <div class="card-badge">PREMIUM WPC</div>
        </div>
        <div class="card-body">
          <h3 class="card-title">{{ t().products.acoustics }}</h3>
          <p class="card-text">{{ t().products.acousticsDesc }}</p>
          <a href="#contacts" class="btn btn-outline card-cta">{{ t().products.discover }}</a>
        </div>
      </div>

<section id="about" class="section">
  <div class="container">
    <div class="grid-split">
      <div class="about-visual">
        <div class="visual-card">
          <!-- Geometric stylized abstract panel icon representation -->
          <svg class="abstract-geometry" viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="300" height="300" rx="12" fill="var(--primary-dark)"/>
            <g opacity="0.8">
              <!-- Geometric diagonal and vertical lines representing CNC precision -->
              <line x1="30" y1="0" x2="30" y2="300" stroke="var(--primary-wood)" stroke-width="2" />
              <line x1="60" y1="0" x2="60" y2="300" stroke="var(--primary-wood)" stroke-dasharray="4 4" stroke-width="1" />
              <line x1="90" y1="0" x2="90" y2="300" stroke="var(--primary-wood)" stroke-width="3" />
              <line x1="120" y1="0" x2="120" y2="300" stroke="var(--primary-wood)" stroke-dasharray="4 4" stroke-width="1" />
              <line x1="150" y1="0" x2="150" y2="300" stroke="var(--primary-wood)" stroke-width="2" />
              <line x1="180" y1="0" x2="180" y2="300" stroke="var(--primary-wood)" stroke-dasharray="4 4" stroke-width="1" />
              <line x1="210" y1="0" x2="210" y2="300" stroke="var(--primary-wood)" stroke-width="4" />
              <line x1="240" y1="0" x2="240" y2="300" stroke="var(--primary-wood)" stroke-dasharray="4 4" stroke-width="1" />
              <line x1="270" y1="0" x2="270" y2="300" stroke="var(--primary-wood)" stroke-width="2" />
            </g>
            <circle cx="210" cy="150" r="50" fill="var(--bg-light)" opacity="0.1" />
            <circle cx="90" cy="220" r="30" fill="var(--primary-wood)" opacity="0.3" />
            <path d="M 0,250 Q 150,150 300,250" stroke="var(--primary-wood)" stroke-width="2" fill="none" opacity="0.5"/>
          </svg>
          <div class="visual-overlay-info">
            <span class="overlay-title">AERWOOD R&D</span>
            <span class="overlay-subtitle">Engineering Design</span>
          </div>
        </div>
      </div>
      
      <div class="about-content">
        <span class="badge badge-wood">{{ t().about.badge }}</span>
        <h2 class="section-title">{{ t().about.title }}</h2>
        <p class="lead-text">{{ t().about.text1 }}</p>
        <p class="body-text">{{ t().about.text2 }}</p>
        
        <!-- Stats Row -->
        <div class="stats-row">
          <div class="stat-item">
            <span class="stat-number">25+</span>
            <span class="stat-label">{{ t().about.stat_experience }}</span>
          </div>
          <div class="stat-item">
            <span class="stat-number">FSC®</span>
            <span class="stat-label">{{ t().about.stat_certified }}</span>
          </div>
          <div class="stat-item">
            <span class="stat-number">100%</span>
            <span class="stat-label">{{ t().about.stat_quality }}</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<section id="about" class="section section-proud">
  <div class="container text-center">
    <span class="badge badge-wood">{{ t().about.badge }}</span>
    <h2 class="about-title">{{ t().about.title }}</h2>
    <div class="about-quote">
      <p class="proud-text-1">“{{ t().about.text1 }}”</p>
      <p class="proud-text-2">{{ t().about.text2 }}</p>
    </div>
    
    <div class="about-divider-line"></div>
  </div>
</section>

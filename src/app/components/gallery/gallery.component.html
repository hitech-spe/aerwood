<section id="gallery" class="section">
  <div class="container">
    <div class="section-header text-center">
      <span class="badge badge-wood">{{ t().gallery.badge }}</span>
      <h2 class="section-title">{{ t().gallery.title }}</h2>
      <p class="section-intro">{{ t().gallery.intro }}</p>
    </div>
    
    <div class="configurator-container">
      
      <!-- Interactive SVG Render Area -->
      <div class="render-viewport">
        <!-- SVG Pattern Definitions -->
        <svg class="render-canvas" viewBox="0 0 800 500" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <!-- Walnut slatted pattern -->
            <pattern id="pat-walnut" width="22" height="20" patternUnits="userSpaceOnUse">
              <rect width="13" height="20" fill="#503522" />
              <rect x="13" width="9" height="20" fill="#321D12" />
              <line x1="13" y1="0" x2="13" y2="20" stroke="#1D0E09" stroke-width="1.5" />
              <line x1="22" y1="0" x2="22" y2="20" stroke="#1D0E09" stroke-width="1.5" />
            </pattern>
            
            <!-- Light Oak slatted pattern -->
            <pattern id="pat-oak" width="16" height="20" patternUnits="userSpaceOnUse">
              <rect width="10" height="20" fill="#DDBB8E" />
              <rect x="10" width="6" height="20" fill="#B2946A" />
              <line x1="10" y1="0" x2="10" y2="20" stroke="#7A5D3E" stroke-width="1" />
              <line x1="16" y1="0" x2="16" y2="20" stroke="#7A5D3E" stroke-width="1" />
            </pattern>
            
            <!-- Charcoal Ash slatted pattern -->
            <pattern id="pat-charcoal" width="18" height="20" patternUnits="userSpaceOnUse">
              <rect width="11" height="20" fill="#2E2F31" />
              <rect x="11" width="7" height="20" fill="#1B1C1D" />
              <line x1="11" y1="0" x2="11" y2="20" stroke="#0C0D0E" stroke-width="1" />
              <line x1="18" y1="0" x2="18" y2="20" stroke="#0C0D0E" stroke-width="1" />
            </pattern>

            <!-- Sunset sky gradient for Villa -->
            <linearGradient id="sunset-sky" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" stop-color="#1A2238" />
              <stop offset="50%" stop-color="#3A2D3C" />
              <stop offset="100%" stop-color="#C29B38" />
            </linearGradient>

            <!-- Sunny sky gradient for Pool -->
            <linearGradient id="sunny-sky" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" stop-color="#7BB6EC" />
              <stop offset="100%" stop-color="#E2EEFA" />
            </linearGradient>

            <!-- Night sky gradient for Rooftop -->
            <linearGradient id="night-sky" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" stop-color="#080B11" />
              <stop offset="100%" stop-color="#18233C" />
            </linearGradient>

            <!-- Pool water gradient -->
            <linearGradient id="pool-water" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" stop-color="#00A8CC" />
              <stop offset="100%" stop-color="#005B73" />
            </linearGradient>

            <!-- Glare reflection on glass -->
            <linearGradient id="glass-reflection" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.15" />
              <stop offset="35%" stop-color="#FFFFFF" stop-opacity="0.03" />
              <stop offset="36%" stop-color="#FFFFFF" stop-opacity="0" />
              <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0" />
            </linearGradient>

            <!-- Shadow gradients -->
            <linearGradient id="wall-shadow" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#ffffff" stop-opacity="0.05" />
              <stop offset="60%" stop-color="#000000" stop-opacity="0.15" />
              <stop offset="100%" stop-color="#000000" stop-opacity="0.55" />
            </linearGradient>

            <!-- Spotlight cones -->
            <linearGradient id="spotlight-cone-up" x1="50%" y1="100%" x2="50%" y2="0%">
              <stop offset="0%" stop-color="#FFEAA7" stop-opacity="0.3" />
              <stop offset="100%" stop-color="#FFEAA7" stop-opacity="0" />
            </linearGradient>

            <linearGradient id="spotlight-cone-down" x1="50%" y1="0%" x2="50%" y2="100%">
              <stop offset="0%" stop-color="#FFEAA7" stop-opacity="0.3" />
              <stop offset="100%" stop-color="#FFEAA7" stop-opacity="0" />
            </linearGradient>
            
            <filter id="outdoor-shadow" x="-5%" y="-5%" width="110%" height="110%">
              <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#000000" flood-opacity="0.25" />
            </filter>
          </defs>

          <!-- Outer border/frame backing -->
          <rect width="800" height="500" fill="#111111" />
          <rect x="5" y="5" width="790" height="490" fill="#1E1E1E" rx="4" />

          <!-- DYNAMIC OUTDOOR RENDER SCENES -->
          
          <!-- Scene 1: Modern Villa Façade -->
          @if (currentRoom() === 'living') {
            <g id="scene-villa">
              <!-- Twilight Sky -->
              <rect x="50" y="50" width="700" height="350" fill="url(#sunset-sky)" rx="2" />
              
              <!-- WPC Cladding Wall Section -->
              <rect x="330" y="50" width="420" height="270" [attr.fill]="'url(#pat-' + currentFinish() + ')'" />
              <rect x="330" y="50" width="420" height="270" fill="url(#wall-shadow)" opacity="0.45" />

              <!-- Left side concrete masonry wall -->
              <rect x="50" y="50" width="280" height="270" fill="#E2DDD5" />
              <rect x="50" y="50" width="280" height="270" fill="url(#wall-shadow)" opacity="0.2" />
              
              <!-- Large sliding patio window -->
              <rect x="80" y="80" width="180" height="240" fill="#0D1117" rx="2" />
              <rect x="90" y="90" width="75" height="220" fill="#1C252E" />
              <rect x="175" y="90" width="75" height="220" fill="#1C252E" />
              <!-- Glare reflection lines -->
              <rect x="90" y="90" width="75" height="220" fill="url(#glass-reflection)" />
              <rect x="175" y="90" width="75" height="220" fill="url(#glass-reflection)" />

              <!-- Floor: Stone terrace tiles (left) & garden grass (right) -->
              <path d="M 50,320 L 310,320 L 260,400 L 50,400 Z" fill="#99958F" />
              <path d="M 310,320 L 750,320 L 750,400 L 260,400 Z" fill="#2E5A27" />
              
              <!-- Stone terrace joint lines -->
              <line x1="130" y1="320" x2="110" y2="400" stroke="#73706B" stroke-width="1.5" />
              <line x1="220" y1="320" x2="190" y2="400" stroke="#73706B" stroke-width="1.5" />

              <!-- Outdoor up-down spotlights casting light on the WPC Cladding -->
              <g id="villa-sconces">
                <!-- Sconce 1 -->
                <polygon points="420,120 440,120 465,260 395,260" fill="url(#spotlight-cone-down)" />
                <polygon points="420,120 440,120 460,50 400,50" fill="url(#spotlight-cone-up)" />
                <rect x="424" y="110" width="12" height="20" fill="#222222" rx="1" />
                <rect x="426" y="112" width="8" height="3" fill="var(--primary-wood)" />
                <rect x="426" y="125" width="8" height="3" fill="var(--primary-wood)" />

                <!-- Sconce 2 -->
                <polygon points="620,120 640,120 665,260 595,260" fill="url(#spotlight-cone-down)" />
                <polygon points="620,120 640,120 660,50 600,50" fill="url(#spotlight-cone-up)" />
                <rect x="624" y="110" width="12" height="20" fill="#222222" rx="1" />
                <rect x="626" y="112" width="8" height="3" fill="var(--primary-wood)" />
                <rect x="626" y="125" width="8" height="3" fill="var(--primary-wood)" />
              </g>

              <!-- Luxury outdoor lounge chair -->
              <g id="villa-chair" filter="url(#outdoor-shadow)">
                <path d="M 140,340 C 140,315 175,310 175,310 L 205,335 C 205,335 215,350 190,370 L 155,355 Z" fill="#24272B" />
                <rect x="150" y="325" width="38" height="22" rx="3" fill="#E2DDD5" transform="rotate(22 150 325)" />
                <line x1="145" y1="355" x2="140" y2="385" stroke="#111111" stroke-width="4" />
                <line x1="185" y1="365" x2="190" y2="390" stroke="#111111" stroke-width="3.5" />
              </g>

              <!-- Tall designer planter with plants -->
              <g id="villa-pot" filter="url(#outdoor-shadow)">
                <polygon points="675,300 705,300 700,350 680,350" fill="#B3B0A8" />
                <polygon points="670,295 710,295 708,300 672,300" fill="#807D77" />
                <path d="M 690,295 Q 675,210 665,200 Q 685,250 690,295 Z" fill="#1C3F13" />
                <path d="M 690,295 Q 695,190 700,180 Q 705,240 690,295 Z" fill="#3D7A27" />
                <path d="M 690,295 Q 710,220 720,210 Q 705,260 690,295 Z" fill="#2A5C1B" />
              </g>
            </g>
          }

          <!-- Scene 2: Poolside & Solarium -->
          @if (currentRoom() === 'office') {
            <g id="scene-pool">
              <!-- Sunny Day Sky -->
              <rect x="50" y="50" width="700" height="350" fill="url(#sunny-sky)" rx="2" />

              <!-- Back wall: full width WPC partition wall/screen -->
              <rect x="50" y="50" width="700" height="270" [attr.fill]="'url(#pat-' + currentFinish() + ')'" />
              <rect x="50" y="50" width="700" height="270" fill="url(#wall-shadow)" opacity="0.45" />

              <!-- Floor: Pools water (left/center) and wooden WPC Decking (right) -->
              <!-- Pool water (width 400px) -->
              <path d="M 50,320 L 450,320 L 400,400 L 50,400 Z" fill="url(#pool-water)" />
              <!-- Water ripples -->
              <path d="M 100,340 Q 150,335 200,340 T 300,340 T 400,340" stroke="#FFFFFF" stroke-width="1.2" opacity="0.3" fill="none" />
              <path d="M 70,370 Q 140,365 210,370 T 350,370" stroke="#FFFFFF" stroke-width="1.2" opacity="0.2" fill="none" />

              <!-- Deck area: using the active WPC pattern for the decking! -->
              <path d="M 450,320 L 750,320 L 750,400 L 400,400 Z" [attr.fill]="'url(#pat-' + currentFinish() + ')'" />
              <path d="M 450,320 L 750,320 L 750,400 L 400,400 Z" fill="url(#wall-shadow)" opacity="0.35" />
              <!-- Deck board lines -->
              <g stroke="rgba(0,0,0,0.4)" stroke-width="1.5" opacity="0.7">
                <line x1="450" y1="320" x2="400" y2="400" />
                <line x1="510" y1="320" x2="470" y2="400" />
                <line x1="570" y1="320" x2="540" y2="400" />
                <line x1="630" y1="320" x2="610" y2="400" />
                <line x1="690" y1="320" x2="680" y2="400" />
              </g>

              <!-- Pool white stone rim -->
              <polygon points="450,320 460,320 410,400 400,400" fill="#FAFAFA" />

              <!-- Sleek white lounge chair on the deck -->
              <g id="pool-lounger" filter="url(#outdoor-shadow)">
                <polygon points="510,350 640,335 645,342 512,358" fill="#222222" />
                <line x1="620" y1="337" x2="638" y2="315" stroke="#222222" stroke-width="4" />
                <polygon points="515,348 580,340 582,345 517,353" fill="#FAFAFA" />
                <polygon points="580,340 630,320 628,315 578,335" fill="#FAFAFA" />
                <line x1="525" y1="355" x2="520" y2="375" stroke="#222222" stroke-width="3" />
                <line x1="605" y1="343" x2="600" y2="363" stroke="#222222" stroke-width="3" />
              </g>

              <!-- Minimalist Sun Umbrella / Parasol -->
              <g id="pool-umbrella" filter="url(#outdoor-shadow)">
                <line x1="670" y1="360" x2="670" y2="180" stroke="#4A4A4A" stroke-width="4.5" />
                <path d="M 590,180 Q 670,135 750,180 Z" fill="#FAFAFA" stroke="#D1CFC7" stroke-width="1" />
                <polygon points="590,180 750,180 745,186 595,188" fill="#E2DDD5" />
                <circle cx="670" cy="135" r="4.5" fill="var(--primary-wood)" />
              </g>

              <!-- Tall designer planter with palm greenery -->
              <g id="pool-plant" filter="url(#outdoor-shadow)">
                <polygon points="465,340 485,340 480,380 470,380" fill="#E2DDD5" />
                <!-- Palm leaves -->
                <path d="M 475,340 Q 460,280 425,270" stroke="#2E5A27" stroke-width="2.5" fill="none" />
                <path d="M 475,340 Q 490,290 515,285" stroke="#2E5A27" stroke-width="2.5" fill="none" />
                <path d="M 475,340 Q 450,300 415,310" stroke="#1C3F13" stroke-width="2" fill="none" />
                <path d="M 475,340 Q 495,310 525,315" stroke="#1C3F13" stroke-width="2" fill="none" />
              </g>
            </g>
          }

          <!-- Scene 3: Terrace & Roof Garden -->
          @if (currentRoom() === 'hotel') {
            <g id="scene-terrace">
              <!-- Midnight Starry Sky with Moon -->
              <rect x="50" y="50" width="700" height="350" fill="url(#night-sky)" rx="2" />
              <!-- Stars -->
              <circle cx="110" cy="90" r="1.5" fill="#FFFFFF" opacity="0.8" />
              <circle cx="190" cy="130" r="1" fill="#FFFFFF" opacity="0.6" />
              <circle cx="270" cy="80" r="2" fill="#FFFFFF" opacity="0.9" />
              <circle cx="430" cy="110" r="1" fill="#FFFFFF" opacity="0.5" />
              <circle cx="680" cy="100" r="1.5" fill="#FFFFFF" opacity="0.7" />
              <!-- Crescent Moon -->
              <path d="M 620,80 A 15,15 0 1,0 645,95 A 12,12 0 1,1 620,80" fill="#FFEAA7" opacity="0.85" />

              <!-- WPC Screen wall (left to center, width 460px) -->
              <rect x="50" y="50" width="460" height="270" [attr.fill]="'url(#pat-' + currentFinish() + ')'" />
              <rect x="50" y="50" width="460" height="270" fill="url(#wall-shadow)" opacity="0.55" />

              <!-- Right side: Panoramic open view of distant skyline -->
              <path d="M 510,220 L 550,212 L 590,225 L 640,215 L 680,230 L 750,210 L 750,320 L 510,320 Z" fill="#0D131F" opacity="0.95" />
              <!-- Skyline light specks -->
              <rect x="530" y="250" width="5" height="5" fill="#FFEAA7" opacity="0.6" />
              <rect x="560" y="270" width="8" height="4" fill="#FFFFFF" opacity="0.5" />
              <rect x="620" y="240" width="4" height="6" fill="#FFEAA7" opacity="0.7" />
              <rect x="680" y="260" width="6" height="4" fill="#FFEAA7" opacity="0.4" />

              <!-- Floor: Dark slate terrace stone paving -->
              <path d="M 50,320 L 750,320 L 750,400 L 50,400 Z" fill="#2E333D" />
              <line x1="50" y1="320" x2="750" y2="320" stroke="#1C212A" stroke-width="2" />
              <!-- Paving joints -->
              <g stroke="#1C212A" stroke-width="1.5" opacity="0.4">
                <line x1="200" y1="320" x2="165" y2="400" />
                <line x1="380" y1="320" x2="350" y2="400" />
                <line x1="560" y1="320" x2="540" y2="400" />
              </g>

              <!-- High-end transparent glass railings on the right -->
              <polygon points="510,250 750,250 750,320 510,320" fill="url(#glass-reflection)" opacity="0.7" />
              <line x1="510" y1="250" x2="750" y2="250" stroke="#A0AEC0" stroke-width="2" opacity="0.8" />
              <line x1="510" y1="250" x2="510" y2="320" stroke="#718096" stroke-width="2" opacity="0.8" />
              <line x1="630" y1="250" x2="630" y2="320" stroke="#718096" stroke-width="2" opacity="0.6" />
              <line x1="750" y1="250" x2="750" y2="320" stroke="#718096" stroke-width="2" opacity="0.8" />

              <!-- Luxury outdoor terrace sofa in front of WPC screen -->
              <g id="terrace-sofa" filter="url(#outdoor-shadow)">
                <rect x="120" y="300" width="280" height="65" rx="8" fill="#1C1E22" />
                <rect x="130" y="285" width="120" height="25" rx="4" fill="#E2E8F0" />
                <rect x="250" y="285" width="140" height="25" rx="4" fill="#E2E8F0" />
                <rect x="135" y="260" width="110" height="30" rx="6" fill="#CBD5E1" />
                <rect x="255" y="260" width="130" height="30" rx="6" fill="#CBD5E1" />
                <rect x="145" y="265" width="25" height="25" rx="3" fill="var(--primary-wood)" transform="rotate(-15 145 265)" />
              </g>

              <!-- Lounge Table -->
              <g id="terrace-table" filter="url(#outdoor-shadow)">
                <ellipse cx="260" cy="365" rx="45" ry="12" fill="#1A1C1E" />
                <line x1="260" y1="365" x2="260" y2="395" stroke="#1A1C1E" stroke-width="5" />
                <ellipse cx="260" cy="395" rx="25" ry="5" fill="#111111" />
              </g>

              <!-- Tall designer planter with bamboo reeds -->
              <g id="terrace-bamboo" filter="url(#outdoor-shadow)">
                <rect x="440" y="280" width="45" height="60" rx="2" fill="#1A1C1E" />
                <rect x="438" y="276" width="49" height="5" fill="var(--primary-wood)" />
                <!-- Bamboo stems -->
                <path d="M 450,276 Q 445,150 435,110" stroke="#3D7035" stroke-width="3.5" fill="none" />
                <path d="M 462,276 Q 465,130 475,90" stroke="#2E5A27" stroke-width="3" fill="none" />
                <path d="M 470,276 Q 455,170 445,130" stroke="#2E5A27" stroke-width="2.5" fill="none" />
                <!-- Green leaves -->
                <path d="M 438,150 Q 425,140 430,135" fill="#3D7035" />
                <path d="M 468,140 Q 480,130 475,125" fill="#2E5A27" />
                <path d="M 444,190 Q 430,185 435,180" fill="#3D7035" />
                <path d="M 464,180 Q 478,170 472,165" fill="#2E5A27" />
              </g>
            </g>
          }
        </svg>
      </div>

      <!-- Configurator Controls Sidebar -->
      <div class="configurator-controls">
        <h3 class="controls-title">{{ t().gallery.instructions }}</h3>
        
        <!-- Choose Wood Finish -->
        <div class="control-group">
          <label class="control-label">{{ t().gallery.style }}</label>
          <div class="control-options">
            <button 
              class="control-btn" 
              [class.active]="currentFinish() === 'walnut'" 
              (click)="setFinish('walnut')"
            >
              <span class="sample-circle finish-walnut"></span>
              <span class="btn-text">{{ t().gallery.walnut }}</span>
            </button>
            
            <button 
              class="control-btn" 
              [class.active]="currentFinish() === 'oak'" 
              (click)="setFinish('oak')"
            >
              <span class="sample-circle finish-oak"></span>
              <span class="btn-text">{{ t().gallery.oak }}</span>
            </button>
            
            <button 
              class="control-btn" 
              [class.active]="currentFinish() === 'charcoal'" 
              (click)="setFinish('charcoal')"
            >
              <span class="sample-circle finish-charcoal"></span>
              <span class="btn-text">{{ t().gallery.charcoal }}</span>
            </button>
          </div>
        </div>
        
        <!-- Choose Room Environment -->
        <div class="control-group">
          <label class="control-label">{{ t().gallery.room }}</label>
          <div class="control-options">
            <button 
              class="control-btn" 
              [class.active]="currentRoom() === 'living'" 
              (click)="setRoom('living')"
            >
              <span class="room-icon">🛋️</span>
              <span class="btn-text">{{ t().gallery.living }}</span>
            </button>
            
            <button 
              class="control-btn" 
              [class.active]="currentRoom() === 'office'" 
              (click)="setRoom('office')"
            >
              <span class="room-icon">💻</span>
              <span class="btn-text">{{ t().gallery.office }}</span>
            </button>
            
            <button 
              class="control-btn" 
              [class.active]="currentRoom() === 'hotel'" 
              (click)="setRoom('hotel')"
            >
              <span class="room-icon">🏨</span>
              <span class="btn-text">{{ t().gallery.hotel }}</span>
            </button>
          </div>
        </div>

        <div class="render-features">
          <div class="feature-item">
            <span class="feature-icon">✨</span>
            <span class="feature-text">{{ t().gallery.features.texture }}</span>
          </div>
          <div class="feature-item">
            <span class="feature-icon">⚡</span>
            <span class="feature-text">{{ t().gallery.features.rendering }}</span>
          </div>
          <div class="feature-item">
            <span class="feature-icon">🔍</span>
            <span class="feature-text">{{ t().gallery.features.hd }}</span>
          </div>
        </div>

      </div>
    </div>
  </div>
</section>

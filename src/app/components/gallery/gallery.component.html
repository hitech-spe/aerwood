<section id="gallery" class="section">
  <div class="container">
    <div class="section-header text-center">
      <span class="badge badge-wood">{{ t().gallery.badge }}</span>
      <h2 class="section-title">{{ t().gallery.title }}</h2>
      <p class="section-intro">{{ t().gallery.intro }}</p>
    </div>
    
    <div class="configurator-container">
      
      <!-- Interactive SVG Render Area -->
      <div class="render-viewport">
        <!-- SVG Pattern Definitions -->
        <svg class="render-canvas" viewBox="0 0 800 500" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <!-- Walnut slatted pattern -->
            <pattern id="pat-walnut" width="22" height="20" patternUnits="userSpaceOnUse">
              <rect width="13" height="20" fill="#503522" />
              <rect x="13" width="9" height="20" fill="#321D12" />
              <line x1="13" y1="0" x2="13" y2="20" stroke="#1D0E09" stroke-width="1.5" />
              <line x1="22" y1="0" x2="22" y2="20" stroke="#1D0E09" stroke-width="1.5" />
            </pattern>
            
            <!-- Light Oak slatted pattern -->
            <pattern id="pat-oak" width="16" height="20" patternUnits="userSpaceOnUse">
              <rect width="10" height="20" fill="#DDBB8E" />
              <rect x="10" width="6" height="20" fill="#B2946A" />
              <line x1="10" y1="0" x2="10" y2="20" stroke="#7A5D3E" stroke-width="1" />
              <line x1="16" y1="0" x2="16" y2="20" stroke="#7A5D3E" stroke-width="1" />
            </pattern>
            
            <!-- Charcoal Ash slatted pattern -->
            <pattern id="pat-charcoal" width="18" height="20" patternUnits="userSpaceOnUse">
              <rect width="11" height="20" fill="#2E2F31" />
              <rect x="11" width="7" height="20" fill="#1B1C1D" />
              <line x1="11" y1="0" x2="11" y2="20" stroke="#0C0D0E" stroke-width="1" />
              <line x1="18" y1="0" x2="18" y2="20" stroke="#0C0D0E" stroke-width="1" />
            </pattern>

            <!-- Shadow gradients -->
            <linearGradient id="wall-shadow" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#ffffff" stop-opacity="0.1" />
              <stop offset="60%" stop-color="#000000" stop-opacity="0.15" />
              <stop offset="100%" stop-color="#000000" stop-opacity="0.6" />
            </linearGradient>

            <linearGradient id="spotlight-cone" x1="50%" y1="0%" x2="50%" y2="100%">
              <stop offset="0%" stop-color="#FFEAA7" stop-opacity="0.35" />
              <stop offset="100%" stop-color="#FFEAA7" stop-opacity="0" />
            </linearGradient>
            
            <filter id="furniture-shadow" x="-5%" y="-5%" width="110%" height="110%">
              <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.3" />
            </filter>
          </defs>

          <!-- ROOM CONTAINER -->
          <rect width="800" height="500" fill="#F4F1EA" />
          
          <!-- FLOOR -->
          <path d="M 0,400 L 800,400 L 800,500 L 0,500 Z" fill="#E2DDD5" />
          <line x1="0" y1="400" x2="800" y2="400" stroke="#C5BEB5" stroke-width="2" />
          <g stroke="#C5BEB5" stroke-width="0.5" opacity="0.6">
            <line x1="100" y1="400" x2="0" y2="500" />
            <line x1="250" y1="400" x2="150" y2="500" />
            <line x1="400" y1="400" x2="350" y2="500" />
            <line x1="550" y1="400" x2="550" y2="500" />
            <line x1="700" y1="400" x2="750" y2="500" />
          </g>

          <!-- BACK PANEL WALL -->
          <rect x="50" y="50" width="700" height="350" [attr.fill]="'url(#pat-' + currentFinish() + ')'" rx="2" />
          <rect x="50" y="50" width="700" height="350" fill="url(#wall-shadow)" opacity="0.9" rx="2" />

          <!-- Dynamic Room Layers -->
          @if (currentRoom() === 'living') {
            <g id="room-living">
              <ellipse cx="250" cy="50" rx="30" ry="6" fill="#D1CFC7" />
              <polygon points="220,50 280,50 320,180 180,180" fill="url(#spotlight-cone)" />
              
              <ellipse cx="550" cy="50" rx="30" ry="6" fill="#D1CFC7" />
              <polygon points="520,50 580,50 620,180 480,180" fill="url(#spotlight-cone)" />

              <rect x="80" y="80" width="130" height="240" fill="#E4F1FE" rx="4" stroke="#D1CFC7" stroke-width="4" />
              <line x1="145" y1="80" x2="145" y2="320" stroke="#D1CFC7" stroke-width="2" />
              <line x1="80" y1="200" x2="210" y2="200" stroke="#D1CFC7" stroke-width="2" />
              <path d="M 80,80 Q 145,150 210,80" fill="#FFEAA7" opacity="0.1" />

              <g filter="url(#furniture-shadow)">
                <rect x="250" y="310" width="380" height="110" rx="16" fill="var(--primary-dark)" />
                <rect x="260" y="325" width="170" height="70" rx="8" fill="#3A3F44" />
                <rect x="435" y="325" width="175" height="70" rx="8" fill="#3A3F44" />
                <rect x="265" y="270" width="350" height="65" rx="12" fill="#2F3337" />
                <rect x="235" y="300" width="35" height="100" rx="8" fill="#24272B" />
                <rect x="610" y="300" width="35" height="100" rx="8" fill="#24272B" />
                <rect x="275" y="285" width="55" height="55" rx="6" fill="var(--primary-wood)" transform="rotate(-10 275 285)" />
                <rect x="560" y="285" width="50" height="50" rx="6" fill="#FAFAFA" transform="rotate(15 560 285)" opacity="0.9" />
              </g>

              <g filter="url(#furniture-shadow)">
                <ellipse cx="440" cy="425" rx="80" ry="22" fill="#E2DDD5" stroke="#FFFFFF" stroke-width="2" />
                <ellipse cx="440" cy="422" rx="78" ry="20" fill="var(--primary-dark)" />
                <line x1="380" y1="432" x2="370" y2="465" stroke="var(--primary-dark)" stroke-width="3" />
                <line x1="500" y1="432" x2="510" y2="465" stroke="var(--primary-dark)" stroke-width="3" />
                <line x1="440" y1="442" x2="440" y2="470" stroke="var(--primary-dark)" stroke-width="3" />
                <rect x="430" y="390" width="15" height="25" rx="3" fill="#FAFAFA" opacity="0.8" />
                <path d="M 437,390 Q 450,375 442,365" stroke="var(--primary-wood)" stroke-width="1.5" fill="none" />
              </g>

              <g filter="url(#furniture-shadow)">
                <polygon points="690,340 730,340 720,400 700,400" fill="#3D2518" />
                <path d="M 710,340 Q 670,290 660,310 Q 690,335 710,340 Z" fill="#2E5A27" />
                <path d="M 710,340 Q 750,280 765,305 Q 730,335 710,340 Z" fill="#4E8046" />
                <path d="M 710,330 Q 710,250 690,265 Q 700,310 710,330 Z" fill="#20401B" />
                <path d="M 710,330 Q 715,260 735,270 Q 720,310 710,330 Z" fill="#3D7035" />
              </g>
            </g>
          }

          @if (currentRoom() === 'office') {
            <g id="room-office">
              <rect x="250" y="45" width="300" height="12" fill="#EAE8E3" rx="2" />
              <polygon points="250,57 550,57 600,200 200,200" fill="url(#spotlight-cone)" opacity="0.8" />

              <rect x="70" y="80" width="110" height="260" fill="#CADBE9" rx="2" stroke="#FFFFFF" stroke-width="2" />
              <line x1="70" y1="160" x2="180" y2="160" stroke="#FFFFFF" stroke-width="2" />
              <line x1="70" y1="240" x2="180" y2="240" stroke="#FFFFFF" stroke-width="2" />
              <rect x="80" y="270" width="25" height="70" fill="#A5C1D4" opacity="0.6" />
              <rect x="115" y="290" width="30" height="50" fill="#A5C1D4" opacity="0.6" />
              <rect x="150" y="250" width="20" height="90" fill="#A5C1D4" opacity="0.6" />

              <g filter="url(#furniture-shadow)">
                <line x1="240" y1="330" x2="240" y2="440" stroke="#1A1A1A" stroke-width="6" />
                <line x1="610" y1="330" x2="610" y2="440" stroke="#1A1A1A" stroke-width="6" />
                <line x1="240" y1="440" x2="610" y2="440" stroke="#1A1A1A" stroke-width="2" opacity="0.5" />
                <rect x="200" y="320" width="450" height="20" rx="4" fill="#FFFFFF" stroke="#D1CFC7" stroke-width="2" />
                <rect x="202" y="322" width="446" height="16" rx="2" fill="var(--primary-dark)" />
              </g>

              <g filter="url(#furniture-shadow)">
                <line x1="425" y1="440" x2="425" y2="390" stroke="#222222" stroke-width="5" />
                <path d="M 390,445 L 460,445" stroke="#222222" stroke-width="4" />
                <circle cx="390" cy="448" r="4" fill="#111111" />
                <circle cx="425" cy="448" r="4" fill="#111111" />
                <circle cx="460" cy="448" r="4" fill="#111111" />
                <path d="M 380,380 C 380,380 400,390 425,390 C 450,390 470,380 470,380 L 465,365 L 385,365 Z" fill="#3A3F44" />
                <path d="M 370,350 L 375,370 L 385,370" stroke="#222222" stroke-width="3" fill="none" />
                <path d="M 480,350 L 475,370 L 465,370" stroke="#222222" stroke-width="3" fill="none" />
                <path d="M 390,365 C 390,300 460,300 460,365" fill="#24272B" stroke="#222222" stroke-width="3" />
                <path d="M 400,365 C 400,315 450,315 450,365" fill="#3A3F44" opacity="0.7" />
              </g>

              <g>
                <polygon points="300,320 340,320 345,300 295,300" fill="#EAE8E3" />
                <polygon points="290,320 350,320 355,322 285,322" fill="#A09E9B" />
                <rect x="303" y="303" width="34" height="14" fill="#E4F1FE" />
                <path d="M303,303 L337,303 L380,240 L260,240 Z" fill="url(#spotlight-cone)" opacity="0.1" />
                
                <rect x="520" y="310" width="50" height="8" fill="#C29B38" rx="1" />
                <rect x="522" y="304" width="45" height="6" fill="#FAFAFA" rx="1" stroke="#EAE8E3" />
                <rect x="525" y="299" width="40" height="5" fill="var(--primary-dark)" rx="1" />
              </g>
            </g>
          }

          @if (currentRoom() === 'hotel') {
            <g id="room-hotel">
              <g>
                <line x1="300" y1="50" x2="300" y2="150" stroke="#8A6546" stroke-width="1.5" />
                <circle cx="300" cy="150" r="14" fill="#FFEAA7" filter="url(#furniture-shadow)" />
                <circle cx="300" cy="150" r="12" fill="#FFFFFF" />
                <circle cx="300" cy="150" r="45" fill="#FFEAA7" opacity="0.1" />

                <line x1="500" y1="50" x2="500" y2="110" stroke="#8A6546" stroke-width="1.5" />
                <circle cx="500" cy="110" r="18" fill="#FFEAA7" filter="url(#furniture-shadow)" />
                <circle cx="500" cy="110" r="16" fill="#FFFFFF" />
                <circle cx="500" cy="110" r="55" fill="#FFEAA7" opacity="0.1" />
              </g>

              <g filter="url(#furniture-shadow)">
                <rect x="220" y="280" width="420" height="135" rx="8" fill="#FFFFFF" />
                <path d="M 230,290 C 290,340 310,310 390,360" stroke="#E2DDD5" stroke-width="2" fill="none" opacity="0.8" />
                <path d="M 400,285 C 450,360 480,300 580,380" stroke="#E2DDD5" stroke-width="3" fill="none" opacity="0.8" />
                <path d="M 330,370 C 370,410 400,380 490,415" stroke="#E2DDD5" stroke-width="1.5" fill="none" opacity="0.6" />
                <rect x="220" y="295" width="420" height="8" fill="var(--primary-wood)" />
                <rect x="220" y="405" width="420" height="10" fill="var(--primary-dark)" />
              </g>

              <g filter="url(#furniture-shadow)">
                <path d="M 90,360 C 90,320 130,310 130,310 C 130,310 170,320 170,360 L 165,420 L 95,420 Z" fill="var(--primary-dark)" />
                <rect x="100" y="365" width="60" height="50" rx="6" fill="#C29B38" />
                <line x1="110" y1="420" x2="105" y2="435" stroke="var(--primary-dark)" stroke-width="4" />
                <line x1="150" y1="420" x2="155" y2="435" stroke="var(--primary-dark)" stroke-width="4" />
              </g>

              <g filter="url(#furniture-shadow)">
                <rect x="670" y="280" width="50" height="130" rx="4" fill="#2E2F31" />
                <line x1="670" y1="300" x2="720" y2="300" stroke="var(--primary-wood)" stroke-width="2" />
                <path d="M 695,280 Q 690,150 670,110" stroke="#2E5A27" stroke-width="3" fill="none" />
                <path d="M 695,280 Q 700,130 720,90" stroke="#4E8046" stroke-width="2.5" fill="none" />
                <path d="M 695,280 Q 680,180 655,140" stroke="#2D5A27" stroke-width="2" fill="none" />
                <path d="M 695,280 Q 715,160 735,120" stroke="#3D7035" stroke-width="2" fill="none" />
              </g>
            </g>
          }
        </svg>
      </div>

      <!-- Configurator Controls Sidebar -->
      <div class="configurator-controls">
        <h3 class="controls-title">{{ t().gallery.instructions }}</h3>
        
        <!-- Choose Wood Finish -->
        <div class="control-group">
          <label class="control-label">{{ t().gallery.style }}</label>
          <div class="control-options">
            <button 
              class="control-btn" 
              [class.active]="currentFinish() === 'walnut'" 
              (click)="setFinish('walnut')"
            >
              <span class="sample-circle finish-walnut"></span>
              <span class="btn-text">{{ t().gallery.walnut }}</span>
            </button>
            
            <button 
              class="control-btn" 
              [class.active]="currentFinish() === 'oak'" 
              (click)="setFinish('oak')"
            >
              <span class="sample-circle finish-oak"></span>
              <span class="btn-text">{{ t().gallery.oak }}</span>
            </button>
            
            <button 
              class="control-btn" 
              [class.active]="currentFinish() === 'charcoal'" 
              (click)="setFinish('charcoal')"
            >
              <span class="sample-circle finish-charcoal"></span>
              <span class="btn-text">{{ t().gallery.charcoal }}</span>
            </button>
          </div>
        </div>
        
        <!-- Choose Room Environment -->
        <div class="control-group">
          <label class="control-label">{{ t().gallery.room }}</label>
          <div class="control-options">
            <button 
              class="control-btn" 
              [class.active]="currentRoom() === 'living'" 
              (click)="setRoom('living')"
            >
              <span class="room-icon">🛋️</span>
              <span class="btn-text">{{ t().gallery.living }}</span>
            </button>
            
            <button 
              class="control-btn" 
              [class.active]="currentRoom() === 'office'" 
              (click)="setRoom('office')"
            >
              <span class="room-icon">💻</span>
              <span class="btn-text">{{ t().gallery.office }}</span>
            </button>
            
            <button 
              class="control-btn" 
              [class.active]="currentRoom() === 'hotel'" 
              (click)="setRoom('hotel')"
            >
              <span class="room-icon">🏨</span>
              <span class="btn-text">{{ t().gallery.hotel }}</span>
            </button>
          </div>
        </div>

        <div class="render-features">
          <div class="feature-item">
            <span class="feature-icon">✨</span>
            <span class="feature-text">{{ t().gallery.features.texture }}</span>
          </div>
          <div class="feature-item">
            <span class="feature-icon">⚡</span>
            <span class="feature-text">{{ t().gallery.features.rendering }}</span>
          </div>
          <div class="feature-item">
            <span class="feature-icon">🔍</span>
            <span class="feature-text">{{ t().gallery.features.hd }}</span>
          </div>
        </div>

      </div>
    </div>
  </div>
</section>

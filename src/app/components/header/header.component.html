<header class="header">
  <div class="container header-container">
    <a href="#" class="logo">
      <span class="logo-text">AER<span>WOOD</span></span>
    </a>
    
    <nav class="nav">
      <a href="#home" class="nav-link">{{ t().nav.home }}</a>
      <a href="#about" class="nav-link">{{ t().nav.about }}</a>
      <a href="#products" class="nav-link">{{ t().nav.products }}</a>
      <a href="#gallery" class="nav-link">{{ t().nav.gallery }}</a>
      <a href="#sustainability" class="nav-link">{{ t().nav.sustainability }}</a>
    </nav>
    
    <div class="header-actions">
      <!-- Language Switcher -->
      <div class="lang-switcher">
        <button [class.active]="currentLang() === 'it'" (click)="setLanguage('it')" aria-label="Italiano">IT</button>
        <span class="lang-divider">|</span>
        <button [class.active]="currentLang() === 'en'" (click)="setLanguage('en')" aria-label="English">EN</button>
      </div>
      
      <a href="#contacts" class="btn btn-outline-light nav-cta">{{ t().nav.contacts }}</a>
    </div>
  </div>
</header>

<header class="header" [class.menu-open]="isMenuOpen()">
  <div class="container header-container">
    <a routerLink="/" fragment="home" class="logo" (click)="closeMenu()">
      <span class="logo-text">AIR<span>WOOD</span></span>
    </a>
    
    <!-- Desktop and Mobile Navigation Menu -->
    <nav class="nav" [class.active]="isMenuOpen()">
      <a routerLink="/" fragment="home" class="nav-link" (click)="closeMenu()">{{ t().nav.home }}</a>
      <a routerLink="/" fragment="products" class="nav-link" (click)="closeMenu()">{{ t().nav.products }}</a>
      <a routerLink="/" fragment="ventilated-facade" class="nav-link" (click)="closeMenu()">{{ t().nav.ventilatedFacade }}</a>
      <a routerLink="/" fragment="colors" class="nav-link" (click)="closeMenu()">{{ t().nav.colors }}</a>
      <a routerLink="/" fragment="projects" class="nav-link" (click)="closeMenu()">{{ t().nav.projects }}</a>
      <a routerLink="/" fragment="technical" class="nav-link" (click)="closeMenu()">{{ t().nav.technical }}</a>
    </nav>
    
    <div class="header-actions">
      <!-- Language Switcher -->
      <div class="lang-switcher">
        <button [class.active]="currentLang() === 'it'" (click)="setLanguage('it')" aria-label="Italiano">IT</button>
        <span class="lang-divider">|</span>
        <button [class.active]="currentLang() === 'en'" (click)="setLanguage('en')" aria-label="English">EN</button>
      </div>
      
      <a routerLink="/" fragment="contacts" class="btn btn-outline-light nav-cta" (click)="closeMenu()">{{ t().nav.contacts }}</a>
      
      <!-- Hamburger Menu Button -->
      <button class="hamburger-btn" (click)="toggleMenu()" [attr.aria-expanded]="isMenuOpen()" aria-label="Toggle menu">
        <span class="bar bar-1"></span>
        <span class="bar bar-2"></span>
        <span class="bar bar-3"></span>
      </button>
    </div>
  </div>
</header>

<footer class="footer">
  <div class="container footer-container">
    <div class="footer-top">
      <div class="footer-brand">
        <span class="logo-text">AER<span>WOOD</span></span>
        <p class="footer-desc">{{ t().footer.rights }}</p>
      </div>
      
      <div class="footer-links">
        <a routerLink="/" fragment="home">{{ t().nav.home }}</a>
        <a routerLink="/" fragment="about">{{ t().nav.about }}</a>
        <a routerLink="/" fragment="products">{{ t().nav.products }}</a>
        <a routerLink="/" fragment="gallery">{{ t().nav.gallery }}</a>
        <a routerLink="/" fragment="sustainability">{{ t().nav.sustainability }}</a>
      </div>
    </div>
    
    <hr class="footer-divider" />
    
    <div class="footer-bottom">
      <span class="footer-copy">{{ t().footer.copyright }}</span>
      
      <div class="footer-legal-links">
        <a routerLink="/privacy-policy">{{ t().footer.privacy }}</a>
        <span class="footer-legal-divider">|</span>
        <a routerLink="/terms-conditions">{{ t().footer.terms }}</a>
      </div>
      
      <span class="footer-vat">{{ t().footer.vat }}</span>

      <div class="footer-developer">
        <span>{{ t().footer.developedBy }}</span>
        <a href="https://hitechsrls.com/" target="_blank" rel="noopener noreferrer" title="Hitech S.r.l.s.">
          <img src="/assets/logo-trasp.png" alt="Hitech S.r.l.s. Logo" class="developer-logo" />
        </a>
      </div>
    </div>
  </div>
</footer>

<section id="why-wpc" class="section section-light-beige">
  <div class="container">
    <div class="section-header text-center">
      <span class="badge badge-wood">{{ t().whyWpc.badge }}</span>
      <h2 class="section-title">{{ t().whyWpc.title }}</h2>
    </div>
    
    <div class="grid-four">
      <!-- Feature 1: Waterproof -->
      <div class="why-card">
        <div class="why-icon-container">
          <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" class="why-svg">
            <path d="M32 8 C16 28 16 48 32 56 C48 48 48 28 32 8 Z" fill="rgba(194, 155, 56, 0.15)" stroke="var(--primary-wood)" stroke-width="2.5" stroke-linejoin="round"/>
            <path d="M32 20 A 12 12 0 0 0 20 32" stroke="var(--primary-wood)" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <h3 class="why-card-title">{{ t().whyWpc.waterproof }}</h3>
        <p class="why-card-text">{{ t().whyWpc.waterproofDesc }}</p>
      </div>
      
      <!-- Feature 2: Zero Maintenance -->
      <div class="why-card">
        <div class="why-icon-container">
          <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" class="why-svg">
            <rect x="14" y="10" width="36" height="44" rx="4" stroke="var(--primary-wood)" stroke-width="2.5"/>
            <path d="M22 20 H42" stroke="var(--primary-wood)" stroke-width="2" stroke-linecap="round"/>
            <path d="M22 28 H34" stroke="var(--primary-wood)" stroke-width="2" stroke-linecap="round"/>
            <circle cx="40" cy="40" r="10" stroke="var(--primary-wood)" stroke-width="2" fill="rgba(194, 155, 56, 0.15)"/>
            <path d="M40 35 V45" stroke="var(--primary-wood)" stroke-width="2" stroke-linecap="round"/>
            <path d="M35 40 H45" stroke="var(--primary-wood)" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <h3 class="why-card-title">{{ t().whyWpc.maintenance }}</h3>
        <p class="why-card-text">{{ t().whyWpc.maintenanceDesc }}</p>
      </div>
      
      <!-- Feature 3: Wood Effect -->
      <div class="why-card">
        <div class="why-icon-container">
          <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" class="why-svg">
            <circle cx="32" cy="32" r="24" stroke="var(--primary-wood)" stroke-width="2.5" fill="rgba(194, 155, 56, 0.15)"/>
            <circle cx="32" cy="32" r="18" stroke="var(--primary-wood)" stroke-width="1.5" stroke-dasharray="3 3"/>
            <circle cx="32" cy="32" r="12" stroke="var(--primary-wood)" stroke-width="2"/>
            <circle cx="32" cy="32" r="6" stroke="var(--primary-wood)" stroke-width="1"/>
            <line x1="32" y1="8" x2="32" y2="56" stroke="var(--primary-wood)" stroke-width="1.5" opacity="0.3"/>
          </svg>
        </div>
        <h3 class="why-card-title">{{ t().whyWpc.woodEffect }}</h3>
        <p class="why-card-text">{{ t().whyWpc.woodEffectDesc }}</p>
      </div>
      
      <!-- Feature 4: Eco-friendly -->
      <div class="why-card">
        <div class="why-icon-container">
          <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" class="why-svg">
            <path d="M12 24 C12 10 32 6 32 6 C32 6 52 10 52 24 C52 44 32 58 32 56 C32 58 12 44 12 24 Z" fill="rgba(46, 125, 50, 0.1)" stroke="var(--eco-green)" stroke-width="2.5"/>
            <path d="M32 16 V46" stroke="var(--eco-green)" stroke-width="2" stroke-linecap="round"/>
            <path d="M32 24 C24 28 20 34 20 34" stroke="var(--eco-green)" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M32 30 C40 34 44 40 44 40" stroke="var(--eco-green)" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <h3 class="why-card-title" style="color: var(--eco-green);">{{ t().whyWpc.eco }}</h3>
        <p class="why-card-text">{{ t().whyWpc.ecoDesc }}</p>
      </div>
    </div>
  </div>
</section>

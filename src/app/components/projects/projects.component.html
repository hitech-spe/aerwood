<section id="projects" class="section projects-section">
  <div class="container">
    <div class="section-header text-center">
      <span class="badge badge-wood">{{ t().projects.badge }}</span>
      <h2 class="section-title">{{ t().projects.title }}</h2>
      <p class="section-intro">{{ t().projects.intro }}</p>
    </div>
    
    <div class="projects-grid">
      <div class="project-item">
        <div class="project-img-wrapper">
          <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=800&q=80" [alt]="t().projects.project1Title" class="project-image" />
          <div class="project-overlay">
            <span class="project-tag">VILLA PRIVATA</span>
            <h3 class="project-name">{{ t().projects.project1Title }}</h3>
            <p class="project-desc">{{ t().projects.project1Desc }}</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<section id="home" class="hero">
  <div class="hero-bg-overlay"></div>
  <div class="container hero-container">
    <span class="hero-badge badge badge-wood">AERWOOD PANELS</span>
    <h1 class="hero-title">{{ t().hero.title }}</h1>
    <p class="hero-subtitle">{{ t().hero.subtitle }}</p>
    <div class="hero-ctas">
      <a href="#gallery" class="btn btn-primary">{{ t().hero.cta }}</a>
      <a href="#about" class="btn btn-outline-light">{{ t().nav.about }}</a>
    </div>
  </div>
  
  <!-- Bottom Wave Divider -->
  <div class="hero-divider">
    <svg viewBox="0 0 1440 120" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
      <path d="M0,32L120,42.7C240,53,480,75,720,74.7C960,75,1200,53,1320,42.7L1440,32L1440,120L1320,120C1200,120,960,120,720,120C480,120,240,120,120,120L0,120Z" fill="var(--bg-light)"></path>
    </svg>
  </div>
</section>

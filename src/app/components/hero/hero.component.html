<section id="home" class="hero">
  <div class="hero-bg-overlay"></div>
  <div class="container hero-container">
    <span class="hero-badge badge badge-wood">AIRWOOD WPC</span>
    <h1 class="hero-title">{{ t().hero.title }}</h1>
    <p class="hero-subtitle">{{ t().hero.subtitle }}</p>
    <div class="hero-ctas">
      <a href="#products" class="btn btn-primary">{{ t().hero.cta }}</a>
      <a href="#contacts" class="btn btn-outline-light">{{ t().hero.ctaSecondary }}</a>
    </div>
  </div>
  
  <!-- Bottom Angle/Wave Divider -->
  <div class="hero-divider">
    <svg viewBox="0 0 1440 120" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
      <path d="M0,80 L1440,0 L1440,120 L0,120 Z" fill="var(--bg-light)"></path>
    </svg>
  </div>
</section>
